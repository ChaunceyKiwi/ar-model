<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<a-scene
  xr-mode-ui="enabled: true; XRMode: ar"
  webxr="requiredFeatures: local-floor; optionalFeatures: hit-test,hand-tracking,depth-sensing;"
  renderer="colorManagement: true; physicallyCorrectLights: true;">
  <a-assets>
    <a-asset-item id="model" src="my-model.glb"></a-asset-item>
  </a-assets>

  <a-entity light="type: ambient; intensity: 0.8"></a-entity>
  <a-entity light="type: directional; intensity: 0.6" position="1 2 1"></a-entity>

  <a-entity
    id="my-model"
    gltf-model="#model"
    position="0 0 -1"
    scale="1 1 1"
    grabbable>
  </a-entity>

  <a-entity hand-tracking-controls="hand: left" hand-tracking-grab-controls="hand: left; hoverEnabled: true"></a-entity>
  <a-entity hand-tracking-controls="hand: right" hand-tracking-grab-controls="hand: right; hoverEnabled: true"></a-entity>

  <a-camera></a-camera>
</a-scene>
