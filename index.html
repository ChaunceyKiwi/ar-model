<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script>
  AFRAME.registerComponent('joystick-control', {
    schema: {
      target: { type: 'selector' },
      mode: { default: 'move' },        // 'move' or 'rotate'
      moveSpeed: { default: 1.0 },      // meters / second
      rotateSpeed: { default: 90 }      // degrees / second
    },
    init: function () {
      this.stick = { x: 0, y: 0 };
      this.onThumbstick = this.onThumbstick.bind(this);
      this.el.addEventListener('thumbstickmoved', this.onThumbstick);
    },
    onThumbstick: function (evt) {
      this.stick.x = evt.detail.x;
      this.stick.y = evt.detail.y;
    },
    tick: function (time, delta) {
      var target = this.data.target;
      if (!target) return;
      var dt = (delta || 0) / 1000;
      var x = Math.abs(this.stick.x) > 0.1 ? this.stick.x : 0;
      var y = Math.abs(this.stick.y) > 0.1 ? this.stick.y : 0;
      if (x === 0 && y === 0) return;
      var obj = target.object3D;
      if (this.data.mode === 'move') {
        // right stick: x = strafe, y(up) = push away
        obj.position.x += x * this.data.moveSpeed * dt;
        obj.position.z += y * this.data.moveSpeed * dt;
      } else {
        // left stick: x = rotate (yaw), y(up) = raise
        obj.rotation.y -= x * THREE.MathUtils.degToRad(this.data.rotateSpeed) * dt;
        obj.position.y -= y * this.data.moveSpeed * dt;
      }
    }
  });
</script>

<a-scene
  xr-mode-ui="enabled: true; XRMode: ar"
  webxr="requiredFeatures: local-floor; optionalFeatures: hit-test,hand-tracking,depth-sensing;"
  renderer="colorManagement: true; physicallyCorrectLights: true;">
  <a-assets>
    <a-asset-item id="model" src="my-model.glb"></a-asset-item>
  </a-assets>

  <a-entity light="type: ambient; intensity: 0.8"></a-entity>
  <a-entity light="type: directional; intensity: 0.6" position="1 2 1"></a-entity>

  <a-entity
    id="my-model"
    gltf-model="#model"
    position="0 0 -1"
    scale="1 1 1"
    grabbable>
  </a-entity>

  <a-entity hand-tracking-controls="hand: left" hand-tracking-grab-controls="hand: left; hoverEnabled: true"></a-entity>
  <a-entity hand-tracking-controls="hand: right" hand-tracking-grab-controls="hand: right; hoverEnabled: true"></a-entity>

  <a-entity oculus-touch-controls="hand: left" joystick-control="target: #my-model; mode: rotate"></a-entity>
  <a-entity oculus-touch-controls="hand: right" joystick-control="target: #my-model; mode: move"></a-entity>

  <a-camera></a-camera>
</a-scene>
